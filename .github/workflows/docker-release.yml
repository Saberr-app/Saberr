name: Docker Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ui_version:
        description: 'UI version to bundle (empty = use .app-version build-ui-ver / latest). Accepts "1.4.2" or "v1.4.2".'
        required: false

permissions:
  contents: read
  packages: write

jobs:
  prep:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.img.outputs.name }}
      version: ${{ steps.be.outputs.version }}
      prerelease: ${{ steps.be.outputs.prerelease }}
      ui_tag: ${{ steps.ui.outputs.tag }}
      ui_version: ${{ steps.ui.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: "Resolve backend version (guard: pushed tag must match .app-version)"
        id: be
        run: |
          VERSION="$(grep -E '^app-ver=' .app-version | head -n1 | cut -d= -f2 | tr -d '[:space:]')"
          if [ -z "$VERSION" ]; then
            echo "::error::Could not read 'app-ver=' from .app-version"; exit 1
          fi
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${{ github.ref_name }}"
            if [ "$TAG" != "v$VERSION" ]; then
              echo "::error::Pushed tag '$TAG' != .app-version 'v$VERSION'. Bump .app-version or retag."
              exit 1
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          case "$VERSION" in
            *-*) echo "prerelease=true"  >> "$GITHUB_OUTPUT" ;;
            *)   echo "prerelease=false" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Resolve UI version (input → .app-version build-ui-ver → latest)
        id: ui
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REQ="${{ github.event.inputs.ui_version }}"
          if [ -z "$REQ" ]; then
            REQ="$(grep -E '^build-ui-ver=' .app-version | head -n1 | cut -d= -f2 | tr -d '[:space:]')"
          fi
          if [ -z "$REQ" ] || [ "$REQ" = "latest" ]; then
            TAG="$(gh release view --repo saberr-app/saberr-ui --json tagName -q .tagName)"
          else
            case "$REQ" in
              v*) TAG="$REQ" ;;
              *)  TAG="v$REQ" ;;
            esac
          fi
          echo "Resolved UI release: $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Lowercase image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

  build:
    needs: prep
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - name: Prepare platform pair
        run: |
          platform="${{ matrix.platform }}"
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Download + unpack UI into web/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ needs.prep.outputs.ui_tag }}" \
            --repo saberr-app/saberr-ui --pattern '*.zip' --output ui.zip --clobber
          mkdir -p web
          unzip -q ui.zip -d web
          test -f web/index.html || { echo "::error::web/index.html missing after unzip"; exit 1; }

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + push image by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            UI_VERSION=${{ needs.prep.outputs.ui_version }}
          outputs: type=image,name=${{ needs.prep.outputs.image }},push-by-digest=true,name-canonical=true,push=true
          provenance: false
          sbom: false
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_PAIR }}

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: [prep, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags (prereleases never move :latest)
        id: tags
        run: |
          TAGS="-t ${{ needs.prep.outputs.image }}:${{ needs.prep.outputs.version }}"
          if [ "${{ needs.prep.outputs.prerelease }}" = "false" ]; then
            TAGS="$TAGS -t ${{ needs.prep.outputs.image }}:latest"
          fi
          echo "args=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create ${{ steps.tags.outputs.args }} \
            $(printf '${{ needs.prep.outputs.image }}@sha256:%s ' *)

      - name: Inspect
        run: |
          docker buildx imagetools inspect ${{ needs.prep.outputs.image }}:${{ needs.prep.outputs.version }}