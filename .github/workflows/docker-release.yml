name: Docker Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ui_version:
        description: 'UI version to bundle (empty = use .app-version build-ui-ver / latest). Accepts "1.4.2" or "v1.4.2".'
        required: false

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: "Resolve backend version (guard: pushed tag must match .app-version)"
        id: be
        run: |
          VERSION="$(grep -E '^app-ver=' .app-version | head -n1 | cut -d= -f2 | tr -d '[:space:]')"
          if [ -z "$VERSION" ]; then
            echo "::error::Could not read 'app-ver=' from .app-version"; exit 1
          fi
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${{ github.ref_name }}"
            if [ "$TAG" != "v$VERSION" ]; then
              echo "::error::Pushed tag '$TAG' != .app-version 'v$VERSION'. Bump .app-version or retag."
              exit 1
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          case "$VERSION" in
            *-*) echo "prerelease=true"  >> "$GITHUB_OUTPUT" ;;
            *)   echo "prerelease=false" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Resolve UI version (input → .app-version build-ui-ver → latest)
        id: ui
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REQ="${{ github.event.inputs.ui_version }}"
          if [ -z "$REQ" ]; then
            REQ="$(grep -E '^build-ui-ver=' .app-version | head -n1 | cut -d= -f2 | tr -d '[:space:]')"
          fi
          if [ -z "$REQ" ] || [ "$REQ" = "latest" ]; then
            TAG="$(gh release view --repo saberr-app/saberr-ui --json tagName -q .tagName)"
          else
            case "$REQ" in
              v*) TAG="$REQ" ;;
              *)  TAG="v$REQ" ;;
            esac
          fi
          echo "Resolved UI release: $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download + unpack UI into web/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ steps.ui.outputs.tag }}" \
            --repo saberr-app/saberr-ui --pattern '*.zip' --output ui.zip --clobber
          mkdir -p web
          unzip -q ui.zip -d web
          test -f web/index.html || { echo "::error::web/index.html missing after unzip"; exit 1; }

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Compute image tags (prereleases never move :latest)
        id: tags
        run: |
          {
            echo "tags<<EOF"
            echo "${{ steps.img.outputs.name }}:${{ steps.be.outputs.version }}"
            if [ "${{ steps.be.outputs.prerelease }}" = "false" ]; then
              echo "${{ steps.img.outputs.name }}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            UI_VERSION=${{ steps.ui.outputs.version }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
